version: "3.8"

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - mongodb

  frontend:
    build:
      context: .

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mongo_data: