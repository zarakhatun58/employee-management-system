version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ems-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ems

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: backend
    container_name: ems-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}

      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: ems-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
